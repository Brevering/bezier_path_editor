<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Bezier Path Editor</title>

  <script type="importmap">
    {
      "imports": {
        "gsap": "https://esm.sh/gsap@3.14.2",
        "gsap/": "https://esm.sh/gsap@3.14.2/"
      }
    }
  </script>

  <link rel="stylesheet" href="./style.css" />
</head>

<body>
  <header>
    <h1>Bezier Path Editor</h1>
    <p class="subtitle">Drag the handles to shape a cubic Bézier path, then preview it with GSAP.</p>
  </header>

  <section class="toolbar">
    <div class="control-group">
      <label>Curvature
        <input id="curvature" type="number" step="0.1" value="0.4" />
      </label>
      <label>Segments
        <input id="segments" type="number" min="1" max="5" value="1" />
      </label>
      <button id="generate" type="button">Generate</button>
    </div>

    <div class="control-group">
      <button id="lockEndpoints" type="button">Lock Endpoints: OFF</button>
      <button id="addSegment" type="button">+ Segment</button>
      <button id="removeSegment" type="button">− Segment</button>
      <button id="snap" type="button">Snap: OFF</button>
      <button id="preview" type="button">▶ Preview</button>
    </div>

    <div class="control-group">
      <strong>Start:</strong>
      <label>X <input id="startX" type="number" value="625" /></label>
      <label>Y <input id="startY" type="number" value="175" /></label>

      <strong>End:</strong>
      <label>X <input id="endX" type="number" value="79" /></label>
      <label>Y <input id="endY" type="number" value="117" /></label>

      <button id="applyEndpoints" type="button">Apply</button>
    </div>
  </section>

  <div class="stage">
    <svg id="svg" width="900" height="500" viewBox="0 0 900 500">
      <path id="curve" fill="none" stroke="#ff5a5a" stroke-width="2" />
    </svg>
    <div id="box"></div>
  </div>

  <pre id="output"></pre>

  <script type="module" src="./script.js"></script>
</body>

</html>
